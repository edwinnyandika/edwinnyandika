<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
<defs>

  <linearGradient id="footerBg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#020608"/>
    <stop offset="60%"  stop-color="#040e18"/>
    <stop offset="100%" stop-color="#020608"/>
  </linearGradient>

  <!-- Triple color line -->
  <linearGradient id="triLine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="transparent"/>
    <stop offset="15%"  stop-color="#00f5d4"/>
    <stop offset="50%"  stop-color="#00c4ff"/>
    <stop offset="85%"  stop-color="#f5c842"/>
    <stop offset="100%" stop-color="transparent"/>
  </linearGradient>

  <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#00f5d4"/>
    <stop offset="50%"  stop-color="#00c4ff"/>
    <stop offset="100%" stop-color="#f5c842"/>
  </linearGradient>

  <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="bigBlur" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="20"/>
  </filter>

  <pattern id="footerGrid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f5d4" stroke-width="0.3" opacity="0.05"/>
  </pattern>

  <clipPath id="footerClip"><rect width="860" height="200"/></clipPath>

</defs>

<g clip-path="url(#footerClip)">

<!-- BG -->
<rect width="860" height="200" fill="url(#footerBg)"/>
<rect width="860" height="200" fill="url(#footerGrid)"/>

<!-- Ambient blobs -->
<circle cx="200" cy="100" r="120" fill="#00f5d4" opacity="0.04" filter="url(#bigBlur)"/>
<circle cx="660" cy="100" r="100" fill="#00c4ff" opacity="0.04" filter="url(#bigBlur)"/>
<circle cx="430" cy="180" r="90" fill="#f5c842" opacity="0.03" filter="url(#bigBlur)"/>

<!-- TOP ACCENT LINE -->
<rect x="0" y="0" width="860" height="1.5" fill="url(#triLine)" opacity="0.6"/>

<!-- ══ CONSTELLATION MAP (background decoration) ══ -->
<!-- Stars -->
<g fill="#00f5d4">
  <circle cx="80"  cy="42"  r="1.5" opacity="0.4"/>
  <circle cx="145" cy="28"  r="1"   opacity="0.3"/>
  <circle cx="210" cy="55"  r="1.5" opacity="0.35"/>
  <circle cx="160" cy="75"  r="1"   opacity="0.25"/>
  <circle cx="95"  cy="88"  r="1.2" opacity="0.3"/>
  <circle cx="52"  cy="65"  r="1"   opacity="0.2"/>

  <circle cx="650" cy="38"  r="1.5" opacity="0.4"/>
  <circle cx="710" cy="55"  r="1"   opacity="0.3"/>
  <circle cx="780" cy="32"  r="1.5" opacity="0.35"/>
  <circle cx="740" cy="78"  r="1.2" opacity="0.3"/>
  <circle cx="800" cy="70"  r="1"   opacity="0.2"/>
  <circle cx="820" cy="48"  r="1.3" opacity="0.25"/>
</g>
<!-- Constellation lines -->
<g stroke="#00f5d4" stroke-width="0.5" opacity="0.1">
  <line x1="80"  y1="42"  x2="145" y2="28"/>
  <line x1="145" y1="28"  x2="210" y2="55"/>
  <line x1="80"  y1="42"  x2="95"  y2="88"/>
  <line x1="95"  y1="88"  x2="160" y2="75"/>
  <line x1="160" y1="75"  x2="210" y2="55"/>
  <line x1="52"  y1="65"  x2="80"  y2="42"/>

  <line x1="650" y1="38"  x2="710" y2="55"/>
  <line x1="710" y1="55"  x2="780" y2="32"/>
  <line x1="780" y1="32"  x2="820" y2="48"/>
  <line x1="710" y1="55"  x2="740" y2="78"/>
  <line x1="740" y1="78"  x2="800" y2="70"/>
  <line x1="800" y1="70"  x2="820" y2="48"/>
</g>

<!-- ══ LEFT CIRCUIT ══ -->
<g stroke="#00f5d4" stroke-width="0.7" fill="none" opacity="0.18">
  <path d="M20,20 L46,20 L56,30 L56,60 L70,72"/>
  <path d="M20,50 L38,50 L48,60"/>
  <circle cx="70" cy="72" r="2.5" fill="#00f5d4" opacity="0.5"/>
  <circle cx="48" cy="60" r="2"   fill="#00c4ff" opacity="0.4"/>
</g>

<!-- ══ RIGHT CIRCUIT ══ -->
<g stroke="#f5c842" stroke-width="0.7" fill="none" opacity="0.15">
  <path d="M840,20 L814,20 L804,30 L804,60 L790,72"/>
  <path d="M840,50 L822,50 L812,60"/>
  <circle cx="790" cy="72" r="2.5" fill="#f5c842" opacity="0.5"/>
  <circle cx="812" cy="60" r="2"   fill="#f5c842" opacity="0.4"/>
</g>

<!-- Corner brackets -->
<g stroke="#00f5d4" stroke-width="1.2" fill="none" opacity="0.35">
  <polyline points="16,28 16,16 28,16"/>
  <polyline points="832,16 844,16 844,28"/>
  <polyline points="16,172 16,184 28,184"/>
  <polyline points="832,184 844,184 844,172"/>
</g>

<!-- ══ MAIN FOOTER TEXT ══ -->

<!-- NOETIK CORE big label -->
<text x="430" y="92"
  text-anchor="middle"
  font-family="'Arial Black','Impact',sans-serif"
  font-size="38" font-weight="900" letter-spacing="10"
  fill="url(#nameGrad)"
  filter="url(#glow)">NOETIK CORE</text>

<!-- Tagline -->
<text x="430" y="116"
  text-anchor="middle"
  font-family="'Courier New',monospace"
  font-size="11" letter-spacing="3" fill="#4a6070">
  architecting the foundation of a tech ecosystem
</text>

<!-- Middle divider -->
<line x1="160" y1="128" x2="700" y2="128" stroke="#0e2030" stroke-width="1"/>

<!-- Three-column info row -->
<text x="215" y="148" text-anchor="middle"
  font-family="'Courier New',monospace" font-size="9" fill="#2a4050" letter-spacing="1">🎓 GoMyCode 2025</text>

<text x="430" y="148" text-anchor="middle"
  font-family="'Courier New',monospace" font-size="9" fill="#00f5d4" letter-spacing="2" opacity="0.6">⚡ NOETIK CORE</text>

<text x="645" y="148" text-anchor="middle"
  font-family="'Courier New',monospace" font-size="9" fill="#2a4050" letter-spacing="1">📞 +254 718 616 917</text>

<!-- Pulse dot center -->
<circle cx="430" cy="168" r="3" fill="#00f5d4" opacity="0.8" filter="url(#glow)">
  <animate attributeName="r" values="3;7;3" dur="3s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="430" cy="168" r="3" fill="#00f5d4">
  <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.5s" repeatCount="indefinite"/>
</circle>

<!-- Flanking dots -->
<circle cx="380" cy="168" r="2" fill="#00c4ff" opacity="0.35">
  <animate attributeName="opacity" values="0.35;0.7;0.35" dur="2.2s" repeatCount="indefinite"/>
</circle>
<circle cx="480" cy="168" r="2" fill="#f5c842" opacity="0.3">
  <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.7s" repeatCount="indefinite"/>
</circle>
<circle cx="330" cy="168" r="1.5" fill="#00f5d4" opacity="0.2">
  <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.1s" repeatCount="indefinite"/>
</circle>
<circle cx="530" cy="168" r="1.5" fill="#00c4ff" opacity="0.2">
  <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.8s" repeatCount="indefinite"/>
</circle>

<!-- Bottom edge line -->
<rect y="198" width="860" height="2" fill="url(#triLine)" opacity="0.3"/>

</g>
</svg>