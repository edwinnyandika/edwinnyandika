<svg width="860" height="380" viewBox="0 0 860 380" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Deep space background -->
  <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#020608"/>
    <stop offset="40%"  stop-color="#040e1a"/>
    <stop offset="75%"  stop-color="#061628"/>
    <stop offset="100%" stop-color="#020608"/>
  </linearGradient>

  <!-- Name gradient -->
  <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#ffffff"/>
    <stop offset="45%"  stop-color="#00f5d4"/>
    <stop offset="100%" stop-color="#00c4ff"/>
  </linearGradient>

  <!-- Cyan glow radial -->
  <radialGradient id="cyanGlow" cx="0.72" cy="0.35" r="0.45">
    <stop offset="0%"   stop-color="#00f5d4" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#00f5d4" stop-opacity="0"/>
  </radialGradient>

  <!-- Blue glow -->
  <radialGradient id="blueGlow" cx="0.15" cy="0.7" r="0.35">
    <stop offset="0%"   stop-color="#00c4ff" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#00c4ff" stop-opacity="0"/>
  </radialGradient>

  <!-- Gold accent -->
  <radialGradient id="goldGlow" cx="0.5" cy="1.0" r="0.4">
    <stop offset="0%"   stop-color="#f5c842" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
  </radialGradient>

  <!-- Text shadow glow -->
  <filter id="nameGlow" x="-10%" y="-40%" width="120%" height="180%">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="bigBlur" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="18"/>
  </filter>

  <clipPath id="heroClip"><rect width="860" height="380" rx="0"/></clipPath>

  <!-- Grid pattern -->
  <pattern id="heroGrid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#00f5d4" stroke-width="0.35" opacity="0.07"/>
  </pattern>

  <!-- Dot pattern -->
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.9" fill="#00f5d4" opacity="0.1"/>
  </pattern>

</defs>

<g clip-path="url(#heroClip)">

<!-- ── BASE + ATMOSPHERE ── -->
<rect width="860" height="380" fill="url(#heroBg)"/>
<rect width="860" height="380" fill="url(#cyanGlow)"/>
<rect width="860" height="380" fill="url(#blueGlow)"/>
<rect width="860" height="380" fill="url(#goldGlow)"/>
<rect width="860" height="380" fill="url(#heroGrid)"/>
<rect width="860" height="380" fill="url(#dots)" opacity="0.5"/>

<!-- ── BIG AMBIENT ORBS ── -->
<circle cx="660" cy="100" r="160" fill="#00f5d4" opacity="0.06" filter="url(#bigBlur)">
  <animate attributeName="r" values="160;185;160" dur="7s" repeatCount="indefinite"/>
</circle>
<circle cx="120" cy="270" r="130" fill="#00c4ff" opacity="0.05" filter="url(#bigBlur)">
  <animate attributeName="r" values="130;150;130" dur="9s" repeatCount="indefinite"/>
</circle>
<circle cx="430" cy="360" r="110" fill="#f5c842" opacity="0.04" filter="url(#bigBlur)">
  <animate attributeName="r" values="110;130;110" dur="11s" repeatCount="indefinite"/>
</circle>

<!-- ══════════════════════════════════════
     GEOMETRIC ILLUSTRATION — RIGHT SIDE
     Tech / circuit / constellation orb
════════════════════════════════════════ -->

<!-- Outer ring -->
<circle cx="700" cy="175" r="118" fill="none" stroke="#00f5d4" stroke-width="0.7" stroke-opacity="0.18" stroke-dasharray="6 4">
  <animateTransform attributeName="transform" type="rotate" from="0 700 175" to="360 700 175" dur="30s" repeatCount="indefinite"/>
</circle>

<!-- Mid ring -->
<circle cx="700" cy="175" r="88" fill="none" stroke="#00c4ff" stroke-width="0.6" stroke-opacity="0.2" stroke-dasharray="3 6">
  <animateTransform attributeName="transform" type="rotate" from="360 700 175" to="0 700 175" dur="18s" repeatCount="indefinite"/>
</circle>

<!-- Inner filled circle -->
<circle cx="700" cy="175" r="60" fill="#00f5d4" fill-opacity="0.04" stroke="#00f5d4" stroke-width="1" stroke-opacity="0.25"/>

<!-- Core glow -->
<circle cx="700" cy="175" r="28" fill="#00f5d4" fill-opacity="0.08" filter="url(#softGlow)">
  <animate attributeName="r" values="28;34;28" dur="3s" repeatCount="indefinite"/>
  <animate attributeName="fill-opacity" values="0.08;0.15;0.08" dur="3s" repeatCount="indefinite"/>
</circle>

<!-- Core center -->
<circle cx="700" cy="175" r="10" fill="#00f5d4" opacity="0.7" filter="url(#softGlow)">
  <animate attributeName="r" values="10;13;10" dur="2.5s" repeatCount="indefinite"/>
</circle>

<!-- Orbiting dots on outer ring -->
<circle cx="700" cy="57" r="5" fill="#00f5d4" opacity="0.8" filter="url(#softGlow)">
  <animateTransform attributeName="transform" type="rotate" from="0 700 175" to="360 700 175" dur="30s" repeatCount="indefinite"/>
</circle>
<circle cx="700" cy="57" r="3" fill="#fff" opacity="0.6">
  <animateTransform attributeName="transform" type="rotate" from="0 700 175" to="360 700 175" dur="30s" repeatCount="indefinite"/>
</circle>

<!-- Orbiting dot 2 (mid ring) -->
<circle cx="700" cy="87" r="4" fill="#00c4ff" opacity="0.9" filter="url(#softGlow)">
  <animateTransform attributeName="transform" type="rotate" from="120 700 175" to="480 700 175" dur="18s" repeatCount="indefinite"/>
</circle>

<!-- Orbiting dot 3 (mid ring offset) -->
<circle cx="700" cy="87" r="3" fill="#f5c842" opacity="0.7">
  <animateTransform attributeName="transform" type="rotate" from="240 700 175" to="600 700 175" dur="18s" repeatCount="indefinite"/>
</circle>

<!-- Cross hair lines through core -->
<line x1="700" y1="115" x2="700" y2="235" stroke="#00f5d4" stroke-width="0.5" stroke-opacity="0.2"/>
<line x1="640" y1="175" x2="760" y2="175" stroke="#00f5d4" stroke-width="0.5" stroke-opacity="0.2"/>

<!-- Diagonal circuit lines extending from orb -->
<g stroke="#00f5d4" stroke-width="0.8" fill="none" opacity="0.15">
  <path d="M640,115 L600,80 L560,80"/>
  <path d="M640,235 L600,270 L540,270"/>
  <path d="M760,115 L800,80 L840,80"/>
  <path d="M760,235 L800,270 L840,270"/>
  <circle cx="560" cy="80" r="3" fill="#00f5d4" opacity="0.4"/>
  <circle cx="540" cy="270" r="3" fill="#00c4ff" opacity="0.4"/>
  <circle cx="840" cy="80" r="3" fill="#f5c842" opacity="0.4"/>
  <circle cx="840" cy="270" r="3" fill="#00f5d4" opacity="0.4"/>
</g>

<!-- Node grid (constellation) -->
<g fill="#00f5d4" opacity="0.25">
  <circle cx="580" cy="130" r="2"/>
  <circle cx="610" cy="155" r="1.5"/>
  <circle cx="595" cy="195" r="2"/>
  <circle cx="625" cy="215" r="1.5"/>
  <circle cx="795" cy="130" r="2"/>
  <circle cx="770" cy="145" r="1.5"/>
  <circle cx="800" cy="200" r="2"/>
  <circle cx="775" cy="220" r="1.5"/>
</g>
<!-- Constellation lines -->
<g stroke="#00f5d4" stroke-width="0.5" opacity="0.12">
  <line x1="580" y1="130" x2="610" y2="155"/>
  <line x1="610" y1="155" x2="595" y2="195"/>
  <line x1="595" y1="195" x2="625" y2="215"/>
  <line x1="795" y1="130" x2="770" y2="145"/>
  <line x1="770" y1="145" x2="800" y2="200"/>
  <line x1="800" y1="200" x2="775" y2="220"/>
</g>

<!-- ══════════════════════════════════════
     LEFT SIDE — VERTICAL DECORATIONS
════════════════════════════════════════ -->

<!-- Vertical scan bar (animated) -->
<rect x="48" y="0" width="1" height="380" fill="url(#nameGrad)" opacity="0.15">
  <animate attributeName="opacity" values="0.05;0.25;0.05" dur="4s" repeatCount="indefinite"/>
</rect>

<!-- Left circuit decoration -->
<g stroke="#00c4ff" stroke-width="0.8" fill="none" opacity="0.2">
  <path d="M48,60 L70,60 L80,70 L80,100 L90,110"/>
  <path d="M48,140 L65,140 L75,150 L75,180"/>
  <path d="M48,260 L68,260 L78,250 L78,220"/>
  <circle cx="90" cy="110" r="3" fill="#00c4ff" opacity="0.5"/>
  <circle cx="75" cy="180" r="3" fill="#00f5d4" opacity="0.5"/>
  <circle cx="78" cy="220" r="3" fill="#f5c842" opacity="0.5"/>
</g>

<!-- Corner brackets -->
<g stroke="#00f5d4" stroke-width="1.5" fill="none" opacity="0.5">
  <polyline points="20,44 20,22 42,22"/>
  <polyline points="818,22 840,22 840,44"/>
  <polyline points="20,336 20,358 42,358"/>
  <polyline points="818,358 840,358 840,336"/>
</g>

<!-- ══════════════════════════════════════
     TEXT CONTENT
════════════════════════════════════════ -->

<!-- NOETIK CORE tag -->
<text x="82" y="68"
  font-family="'Courier New',monospace"
  font-size="9" letter-spacing="5" fill="#00f5d4" opacity="0.75">
  ✦ NOETIK CORE · EST. 2025 ✦
</text>

<!-- Scan line animation -->
<rect x="0" y="0" width="860" height="1.5" fill="#00f5d4" opacity="0.12">
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,380" dur="6s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.12;0.03;0.12" dur="6s" repeatCount="indefinite"/>
</rect>

<!-- MAIN NAME — EDWIN -->
<text x="82" y="168"
  font-family="'Arial Black','Impact',sans-serif"
  font-size="88" font-weight="900" letter-spacing="3"
  fill="url(#nameGrad)"
  filter="url(#nameGlow)">EDWIN</text>

<!-- MAIN NAME — NYANDIKA -->
<text x="82" y="258"
  font-family="'Arial Black','Impact',sans-serif"
  font-size="88" font-weight="900" letter-spacing="3"
  fill="url(#nameGrad)"
  filter="url(#nameGlow)">NYANDIKA</text>

<!-- Role sub text -->
<text x="84" y="292"
  font-family="'Courier New',monospace"
  font-size="12" letter-spacing="6" fill="#8899aa">
  SOFTWARE · TRADING · DESIGN
</text>

<!-- Live status row -->
<!-- Live dot -->
<circle cx="84" cy="322" r="4.5" fill="#22c55e">
  <animate attributeName="r" values="4.5;6;4.5" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
</circle>
<!-- Pulse ring -->
<circle cx="84" cy="322" r="4.5" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4">
  <animate attributeName="r" values="4.5;11;4.5" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="96" y="326"
  font-family="'Courier New',monospace"
  font-size="10" letter-spacing="2.5" fill="#22c55e">
  BUILDING IN PUBLIC · AVAILABLE FOR WORK
</text>

<!-- Bottom gradient fade into page -->
<defs>
  <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#020608" stop-opacity="0"/>
    <stop offset="100%" stop-color="#020608" stop-opacity="1"/>
  </linearGradient>
</defs>
<rect y="300" width="860" height="80" fill="url(#bottomFade)"/>

<!-- Bottom border glow line -->
<line x1="0" y1="379" x2="860" y2="379" stroke="#00f5d4" stroke-width="1" opacity="0.2"/>

</g>
</svg>