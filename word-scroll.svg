     Each word: fadeIn 0.3s, hold, fadeOut 0.3s
     offset = index × (39.6/18) = index × 2.2s
-->

<!-- Word timing: dur=39.6s, each word on for 2.2s window -->
<!-- We use animateTransform to slide the list + animate opacity per word -->

<!-- Approach: single <text> per word, each with its own animate timing -->

