<svg width="860" height="420" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Background -->
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#020608"/>
    <stop offset="100%" stop-color="#060d16"/>
  </linearGradient>

  <!-- Top/bottom fade masks -->
  <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#020608" stop-opacity="1"/>
    <stop offset="100%" stop-color="#020608" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="fadeBot" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#020608" stop-opacity="0"/>
    <stop offset="100%" stop-color="#020608" stop-opacity="1"/>
  </linearGradient>

  <!-- Glow filter -->
  <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Clip to card -->
  <clipPath id="card">
    <rect width="860" height="420" rx="14"/>
  </clipPath>

</defs>

<g clip-path="url(#card)">

<!-- ── BG ── -->
<rect width="860" height="420" fill="url(#bg)"/>

<!-- Grid lines -->
<g stroke="#00f5d4" stroke-width="0.3" opacity="0.05">
  <line x1="0" y1="84"  x2="860" y2="84"/>
  <line x1="0" y1="168" x2="860" y2="168"/>
  <line x1="0" y1="252" x2="860" y2="252"/>
  <line x1="0" y1="336" x2="860" y2="336"/>
  <line x1="172" y1="0" x2="172" y2="420"/>
  <line x1="344" y1="0" x2="344" y2="420"/>
  <line x1="516" y1="0" x2="516" y2="420"/>
  <line x1="688" y1="0" x2="688" y2="420"/>
</g>

